<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../global/reset.css">
    <link rel="stylesheet" href="../../global/bootstrap.css">
    <link rel="stylesheet" href="../assets/styles/movies-form.css">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>
<main>
    <div class="movies-form">
        <form class="form">
            <input class="form-input" type="text" id="title" name="title" placeholder="title"><br><br>
            <input class="form-overview" type="text" id="overview" name="overview" placeholder="overview"><br><br>
            <input class="form-input" type="url" id="coverUrl" name="coverUrl" placeholder="cover url"><br><br>
            <input class="form-input" type="url" id="fragmanUrl" name="fragmanUrl"
                   placeholder="fragman (youtube embed url)"><br><br>
            <input class="form-input" type="url" id="watchUrl" name="watchUrl" placeholder="watch url"><br><br>
            <input class="form-input" type="url" id="imdbUrl" name="imdbUrl" placeholder="imdb"><br><br>
            <input class="form-input" type="number" id="number" name="number" placeholder="run time minute"><br><br>

            <input class="form-category" type="text" id="category" name="category" placeholder="category">
            <svg class="form-svg" width="15" height="8" viewBox="0 0 15 8" fill="none"
                 xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01691 1.9999L7.36001 6.51995L12.7368 2.04007" stroke="#323B54" stroke-width="2"
                      stroke-linecap="square"/>
            </svg>


            <br><br><br>
            <div class="submit-form">
                <div class="check-area">
                    <label class="checkbox" for="checkbox">Adult</label>
                    <input class="input-check" type="checkbox" id="checkbox" name="checkbox" value="1">
                </div>
                <button class="btn-form">Submit</button>
            </div>


        </form>
        <div class="img-form">
            <img src="../../assets/images/or06FN3Dka5tukK1e9sl16pB3iy%203.svg" alt="">
        </div>
    </div>

</main>

</body>
</html>
