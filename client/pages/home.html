<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page</title>
    <link rel="stylesheet" href="../../global/font.css">
    <link rel="stylesheet" href="../../global/bootstrap.css">
    <link rel="stylesheet" href="../assets/styles/home.css">
</head>
<body>

<div class="sidebar">
    <a href="#" class="active-icon">
        <i class="fas icon-logo-custom"></i>
    </a>
    <a href="#">
        <i class="fas icon-home-custom"></i>
    </a>
    <a href="#">
        <i class="fas icon-home3-custom"></i>
    </a>
    <a href="#">
        <i class="fas icon-home4-custom"></i>
    </a>
    <div class="icon-separator"></div>
    <a href="#">
        <i class="fas icon-home5-custom"></i>
    </a>
</div>

<div class="main-content">

    <!-- Hero Carousel Section -->
    <div id="heroCarousel" class="carousel slide">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
        </div>
        <div class="carousel-inner" style="max-width: 100%; max-height: 700px;">

            <div class="carousel-item active">
                <img src="/client/assets/images/home/header-godzilla_kong_bg.jpg" class="d-block w-100 carousel-custom-img" alt="...">
            </div>
            <div class="carousel-item">
                <img src="/client/assets/images/home/header-godzilla_kong_bg.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
                <img src="/client/assets/images/home/header-godzilla_kong_bg.jpg" class="d-block w-100" alt="...">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
