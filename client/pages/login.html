<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <link rel="stylesheet" href="../../global/reset.css">
    <link rel="stylesheet" href="../../global/bootstrap.css">
    <link rel="stylesheet" href="../assets/styles/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Numans&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-icon">
    <img src="../assets/images/Login_logo.svg" alt="login-icon"/>
    <h1 class="login-title">Filmalisa</h1>
    <h1 class="login-title">Login</h1>

</div>


<main>
    <div class="login-form">

        <form action="home.html" onsubmit="login(); return false;">
            <div class="input-box">

                <svg class="input-svg" width="24" height="24" viewBox="0 0 24 24" fill="none"

                          stroke-linejoin="round"/>
                    <path d="M17 9L13.87 11.5C12.84 12.32 11.15 12.32 10.12 11.5L7 9" stroke="#475069"
                          stroke-width="1.5"
                          stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <input type="text" id="form-email" name="email" placeholder="email" class="email-input">
            </div>


            <div class="input-box">

                <svg class="toogle" width="24" height="24" viewBox="0 0 24 24" fill="none"
                     xmlns="http://www.w3.org/2000/svg">

                          stroke="#475069"
                          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

                          stroke="#475069" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round"
                          stroke-linejoin="round"/>
                    <path d="M10.45 16.2799L9.59998 15.4199" stroke="#475069" stroke-width="1.5" stroke-miterlimit="10"
                          stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M13.3945 10.7H13.4035" stroke="#475069" stroke-width="2" stroke-linecap="round"

                     xmlns="http://www.w3.org/2000/svg">

                          stroke="#475069" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

                <input type="password" id="form-password" name="password" placeholder="password" class="password-input">
                <button class="button loginBtn" type="submit">login</button>
            </div>
        </form>

    </div>
</main>

<script src="../assets/javascript/auth.js"></script>
<script src="../assets/javascript/logout.js"></script>
</body>
</html>
